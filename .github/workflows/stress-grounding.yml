name: Stress Grounding (free key)

# Isolated manual stress run of the full discovery sweep:
# measures whether the free Gemini key hits a 429 across all queries
# and how many distinct players it produces (dedup-by-name fix active).
# No Telegram, no commit, no DB writes.
on:
  workflow_dispatch:

jobs:
  stress-grounding:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run grounding stress sweep
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python scripts/stress_grounding.py
