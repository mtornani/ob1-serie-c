name: OB1 Weekly Report

on:
  schedule:
    # Every Monday at 08:00 UTC (09:00 Italia)
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekly-report:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: main

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Download latest data artifact
      continue-on-error: true
      uses: actions/download-artifact@v4
      with:
        name: ob1-database
        path: data/

    - name: Update dashboard data
      run: |
        if [ -f data/opportunities.json ]; then
          python scripts/generate_dashboard.py
        else
          echo "No data artifact found, skipping dashboard update"
        fi

    - name: Generate weekly report
      run: python scripts/generate_weekly_report.py

    - name: Generate DS report
      run: python scripts/generate_ds_report.py

    - name: Commit report files
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "OB1 Scout Bot"
        git add docs/reports/ docs/data.json || true
        git diff --staged --quiet || git commit -m "📝 Weekly report: $(date -u +'%Y-%m-%d')"
        git push || echo "Nothing to push"

    - name: Notify private channel
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_OFFICE_CHAT_ID: ${{ secrets.TELEGRAM_OFFICE_CHAT_ID }}
      run: |
        python - <<'EOF'
        import os, requests, json
        from pathlib import Path
        from datetime import datetime

        token = os.getenv('TELEGRAM_BOT_TOKEN', '')
        chat = os.getenv('TELEGRAM_CHAT_ID', '') or os.getenv('TELEGRAM_OFFICE_CHAT_ID', '')
        if not token or not chat:
            print("Telegram non configurato, skip")
            raise SystemExit(0)

        stats = {}
        try:
            data = json.loads(Path('docs/data.json').read_text())
            stats = data.get('stats', {})
        except Exception:
            pass

        total = stats.get('total', '—')
        hot   = stats.get('hot', '—')
        warm  = stats.get('warm', '—')
        date  = datetime.now().strftime('%d/%m/%Y')

        text = (
            f"📋 <b>OB1 Lega Pro — Report Settimanale</b>\n"
            f"<i>{date}</i>\n\n"
            f"• Opportunità totali: <b>{total}</b>\n"
            f"• HOT: <b>{hot}</b> · WARM: <b>{warm}</b>\n\n"
            f"🔗 Dashboard aggiornata"
        )
        resp = requests.post(
            f"https://api.telegram.org/bot{token}/sendMessage",
            json={"chat_id": chat, "text": text, "parse_mode": "HTML"},
            timeout=10,
        )
        print(f"Notifica inviata: {resp.status_code}")
        EOF

    - name: Log completion
      run: echo "✅ Weekly report completato $(date -u +'%Y-%m-%d %H:%M UTC')"
