name: Deploy to Cloudflare Pages

on:
  # Triggered after ingest pipeline completes (same timing as GitHub Pages)
  workflow_run:
    workflows: ["OB1 Scout - Auto Ingest & Notify"]
    types: [completed]

  # Manual trigger (for initial setup and hotfixes)
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cf-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    name: Deploy docs/ to Cloudflare Pages

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ob1-lega-pro
          directory: docs
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main
