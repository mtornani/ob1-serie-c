name: Verify Enrichment Ranking

# Isolated manual check: enriches a fixed set of real players + roster-dump
# names and prints the post-enrichment ranking, to verify dump names sink
# below real players. No Telegram, no commit, no DB writes.
on:
  workflow_dispatch:

jobs:
  verify-enrichment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run enrichment verification
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python scripts/verify_enrichment.py
