name: Test Gemini Free Key

# Isolated manual test: verifies the GEMINI_API_KEY secret works
# (plain generation + Google Search grounding). No side effects:
# no Telegram, no commits, no DB writes.
on:
  workflow_dispatch:

jobs:
  test-gemini:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install google-genai
        run: pip install "google-genai>=1.0.0"

      - name: Run Gemini smoke test
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/test_gemini_free.py
